name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'client/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install Capacitor deps
        working-directory: app
        run: npm ci

      - name: Sync Capacitor
        working-directory: app
        run: npx cap sync

      - name: Build APK (debug)
        working-directory: app/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Rename and copy APK to web public dir
        run: |
          cp app/android/app/build/outputs/apk/debug/app-debug.apk client/public/downloads/HealthyBite-Android.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: HealthyBite v${{ github.run_number }}
          body: |
            📱 Android APK build #${{ github.run_number }}
          files: client/public/downloads/HealthyBite-Android.apk
          make_latest: true
