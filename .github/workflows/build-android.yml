name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build web client
        working-directory: client
        run: |
          npm ci
          npm run build

      - name: Install Capacitor deps
        working-directory: app
        run: npm ci

      - name: Sync Capacitor
        working-directory: app
        run: npx cap sync

      - name: Generate release keystore
        run: |
          keytool -genkey -v -keystore release.keystore -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass healthybite -keypass healthybite \
            -dname "CN=HealthyBite, OU=Development, O=HealthyBite, L=Cairo, ST=Cairo, C=EG"

      - name: Build APK (release)
        working-directory: app/android
        run: |
          chmod +x gradlew
          export ANDROID_KEYSTORE_PATH=$GITHUB_WORKSPACE/release.keystore
          export ANDROID_KEYSTORE_PASSWORD=healthybite
          export ANDROID_KEY_ALIAS=release
          export ANDROID_KEY_PASSWORD=healthybite
          ./gradlew assembleRelease

      - name: Rename and copy APK to web public dir
        run: |
          mkdir -p client/public/downloads
          cp app/android/app/build/outputs/apk/release/app-release.apk client/public/downloads/HealthyBite-Android.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: HealthyBite v${{ github.run_number }}
          body: |
            📱 Android APK build #${{ github.run_number }}
          files: client/public/downloads/HealthyBite-Android.apk
          make_latest: true
