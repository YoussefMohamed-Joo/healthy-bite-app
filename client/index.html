    <script>
      // Capacitor cookie persistence via WebView
      document.addEventListener('DOMContentLoaded', function() {
        var cookies = document.cookie
        if (cookies && typeof Capacitor !== 'undefined') {
          try {
            localStorage.setItem('hb_cookies', cookies)
          } catch(e) {}
        }
      })
    </script>
